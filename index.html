<!DOCTYPE html>
<html>
<head>
    <title>Smart Medicine Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💊 Smart Medicine Reminder</h1>

        <form id="reminderForm">
            <label>Medicine Name:</label>
            <input type="text" id="medicineName" required>

            <label>Hour (1-12):</label>
            <input type="number" id="hour" min="1" max="12" required>

            <label>Minute:</label>
            <input type="number" id="minute" min="0" max="59">

            <label>AM / PM:</label>
            <select id="period">
                <option value="AM">AM</option>
                <option value="PM">PM</option>
            </select>

            <button type="submit">Add Reminder</button>
        </form>

        <h2>Your Reminders</h2>
        <div id="reminderList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
